the live game (`index.html` + `js/`) or the preserved legacy app
(`index.legacy.html` + `src/`). Inspect only evidence needed to resolve the
design and preserve compatibility, especially `awo_save_v1` and `window.__AWO`.

Return an executable plan with assumptions, affected files and contracts,
ordered implementation steps, validation gates, and material risks. Prefer one
recommended approach; include alternatives only when they change an important
tradeoff. Keep the result concise despite the higher reasoning budget.
"""
